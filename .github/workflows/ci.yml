name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: [self-hosted, Windows]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Run Windows Deployment Script
      run: .\deploy.ps1
      shell: powershell
